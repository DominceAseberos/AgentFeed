    <div id="root"></div>

    <!-- Lightweight SVG Filter for organic fire/smoke displacement -->
    <svg style="position: absolute; width: 0; height: 0;" width="0" height="0">
      <defs>
        <filter id="fire-displace" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.03 0.08" numOctaves="3" result="noise">
            <animate attributeName="baseFrequency" dur="10s" values="0.03 0.08; 0.03 0.16; 0.03 0.08" repeatCount="indefinite" />
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
